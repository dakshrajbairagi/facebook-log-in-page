<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login UI</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">

            <img src="images/fb-logo.webp" class="logo" alt="Facebook Logo">

            <h1>
                Explore <br>
                the <br>
                things <br>
                <span>you love.</span>
            </h1>

            <img src="images/hero.webp" class="hero" alt="Hero">

        </div>

        <!-- RIGHT SIDE -->

        <div class="right">

            <div class="login-box">

                <h2>Log in to Facebook</h2>

                <input
                    type="text"
                    placeholder="Email address or mobile number">

                <input
                    type="password"
                    placeholder="Password">

                <button class="login-btn">
                    Log in
                </button>

                <a href="#">
                    Forgotten password?
                </a>

                <button class="create-btn">
                    Create new account
                </button>

                <img
                    src="images/meta.jpg"
                    class="meta-logo"
                    alt="Meta">

            </div>

        </div>

    </div>

</body>

</html>
